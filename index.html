<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/registral/favicon.svg" />
    <link rel="apple-touch-icon" href="/registral/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#D97706" />
    <meta name="description" content="Registral — Sistema de gestión para tu negocio. Stock, remitos, clientes y más." />
    <!-- manifest is injected by vite-plugin-pwa -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Registral — Gestión de negocios</title>
  </head>
  <body>
    <!-- SPA redirect: restore path from 404.html query-param hack -->
    <script>
      (function () {
        var loc = window.location;
        // 404.html encodes the real SPA path as /?/some-path
        // with original query params appended as &key=val (& encoded as ~and~)
        if (loc.search[1] === '/') {
          var decoded = loc.search
            .slice(1)                       // remove leading ?
            .replace(/~and~/g, '&');        // restore & characters
          // decoded is now: /some-path&key=val&key2=val2
          // First segment is the path, rest are query params
          var parts = decoded.split('&');
          var path = parts[0];              // /some-path
          var query = parts.length > 1 ? '?' + parts.slice(1).join('&') : '';
          var hash = loc.hash;
          // pathname ends with / (e.g. /registral/), remove trailing slash before appending path
          window.history.replaceState(null, null,
            loc.pathname.slice(0, -1) + path + query + hash
          );
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
